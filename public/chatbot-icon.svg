<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Antenna -->
  <line x1="12" y1="2" x2="12" y2="5" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" />
  <circle cx="12" cy="2" r="1.2" fill="#fbbf24">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- Head -->
  <rect x="4" y="5" width="16" height="13" rx="4" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5" />

  <!-- Eyes -->
  <circle cx="9" cy="11" r="1.8" fill="#fbbf24">
    <animate attributeName="r" values="1.8;1.2;1.8" dur="3s" repeatCount="indefinite" />
  </circle>
  <circle cx="15" cy="11" r="1.8" fill="#fbbf24">
    <animate attributeName="r" values="1.8;1.2;1.8" dur="3s" repeatCount="indefinite" />
  </circle>

  <!-- Smile -->
  <path d="M9 14.5 Q12 17 15 14.5" stroke="#fbbf24" stroke-width="1.3" stroke-linecap="round" fill="none" />

  <!-- Ear pieces -->
  <rect x="1" y="9" width="3" height="5" rx="1.5" fill="#334155" stroke="#fbbf24" stroke-width="1" />
  <rect x="20" y="9" width="3" height="5" rx="1.5" fill="#334155" stroke="#fbbf24" stroke-width="1" />

  <!-- Chat bubble dots -->
  <circle cx="9" cy="22" r="0.8" fill="#fbbf24" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="12" cy="22" r="0.8" fill="#fbbf24" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" begin="0.3s" repeatCount="indefinite" />
  </circle>
  <circle cx="15" cy="22" r="0.8" fill="#fbbf24" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" begin="0.6s" repeatCount="indefinite" />
  </circle>
</svg>
